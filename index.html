<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Well: Reclaimed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="gw-container">
    <header id="gw-header">
      <h1>GRAVITY WELL: <span>RECLAIMED</span></h1>
      <p>Explore the unknown. Build your empire. Fight for every dirtball.</p>
    </header>

    <div id="gw-wrap">
      <canvas id="gw-canvas" tabindex="0"></canvas>
      <div id="gw-hud">
        <div>HULL <span id="h-hull">100</span>%</div>
        <div>SCORE <span id="h-score">0</span></div>
        <div>PLANETS <span id="h-planets">0/7</span></div>
      </div>
      <div id="gw-status">
        <div id="h-credits">CREDITS: 0</div>
        <div id="h-enemies">HOSTILES: 0</div>
        <div id="h-state">FLYING</div>
      </div>
      <div id="gw-msg"></div>
      <div id="gw-focus-hint"><p>Click here to play</p></div>

      <!-- Upgrade shop overlay -->
      <div id="gw-shop" class="hidden">
        <div id="gw-shop-panel">
          <h2>UPGRADE SHOP</h2>
          <p id="shop-credits">CREDITS: 0</p>
          <div id="shop-items"></div>
          <button id="shop-close">CLOSE [U]</button>
        </div>
      </div>
    </div>

    <div id="gw-bar">
      <span class="key">W/&uarr;</span> thrust
      <span class="key">A/D &larr;/&rarr;</span> rotate
      <span class="key">SPACE</span> shoot
      <span class="key">LAND</span> slow + nose away
      <span class="key">F</span> missile
      <span class="key">U</span> shop
      <span class="key">M</span> sound
      <button id="gw-restart">&#8635; Restart</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
